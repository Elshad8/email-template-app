<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Template Generator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .header, .footer, .image, .button, .discount, .survey { padding: 20px; text-align: center; }
        .header { background-color: #f0f0f0; }
        .footer { background-color: #f0f0f0; }
        .button { background-color: #4CAF50; color: white; cursor: pointer; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .table th { background-color: #f2f2f2; }
        .discount { background-color: #ffcc00; padding: 20px; margin: 20px 0; }
        .survey { border: 1px solid #ccc; padding: 20px; margin: 20px 0; }
        .submit-button { background-color: #4CAF50; color: white; padding: 10px; text-align: center; display: inline-block; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Email Template Generator</h1>
    <input type="text" id="prompt" placeholder="Enter your prompt here">
    <button onclick="submitPrompt()">Submit</button>
    <button onclick="resetTemplate()">Reset Template</button>
    <button onclick="undo()">Undo</button>
    <div id="output"></div>
    <script>
        function submitPrompt() {
            const prompt = document.getElementById('prompt').value;
            fetch('/update-template', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('output').innerHTML = data.template;
                }
            });
        }

        function resetTemplate() {
            fetch('/reset-template', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                document.getElementById('output').innerHTML = data.template;
            });
        }

        function undo() {
            fetch('/undo', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                document.getElementById('output').innerHTML = data.template;
            });
        }
    </script>
</body>
</html>
